# Merkezi Konfigürasyon Dosyası
project_name: "Yazlab 2 - Anomaly Detection"

paths:
  data_dir: "data"
  skab_dir: "data/skab"
  batadal_dir: "data/batadal"
  output_dir: "outputs"

automata:
  window_size: 4
  alphabet_size: 3
  pca_components: 1

batadal_split:
  train: 0.60
  val: 0.20
